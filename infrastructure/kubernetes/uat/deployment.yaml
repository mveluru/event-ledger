
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-uat
  namespace: ledger-uat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: gateway:uat
        ports:
        - containerPort: 8080
        env:
        - name: ACCOUNT_SERVICE_URL
          value: "http://account-uat:8081"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-uat
  namespace: ledger-uat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account
  template:
    metadata:
      labels:
        app: account
    spec:
      containers:
      - name: account
        image: account:uat
        ports:
        - containerPort: 8081
