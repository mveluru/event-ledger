
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-qa
  namespace: ledger-qa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: gateway:qa
        ports:
        - containerPort: 8080
        env:
        - name: ACCOUNT_SERVICE_URL
          value: "http://account-qa:8081"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-qa
  namespace: ledger-qa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account
  template:
    metadata:
      labels:
        app: account
    spec:
      containers:
      - name: account
        image: account:qa
        ports:
        - containerPort: 8081
